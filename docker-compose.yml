services:
  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - web
      - user-service
      - document-service
      - ai-service
      - collab-service
      - sync-service
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - notes-net

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: ""
      VITE_WS_BASE_URL: "/ws"
    expose:
      - "5173"
    networks:
      - notes-net

  user-service:
    build:
      context: ./services/user-service
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost/api/user/google/callback}
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:-notes}
      MYSQL_USER: ${MYSQL_USER:-notes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-notes_password}
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-notes_admin}:${MONGO_INITDB_ROOT_PASSWORD:-notes_password}@mongodb:27017
      REDIS_URL: redis://redis:6379
    depends_on:
      - mysql
      - mongodb
      - redis
    expose:
      - "3001"
    networks:
      - notes-net

  document-service:
    build:
      context: ./services/document-service
    environment:
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-notes_admin}:${MONGO_INITDB_ROOT_PASSWORD:-notes_password}@mongodb:27017
      AI_SERVICE_URL: http://ai-service:3003
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: ${MINIO_BUCKET:-notes-assets}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      - mongodb
      - qdrant
      - minio
    expose:
      - "3002"
    networks:
      - notes-net

  ai-service:
    build:
      context: ./services/ai-service
    environment:
      PORT: 3003
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_BASE_URL: ${AI_BASE_URL:-}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - qdrant
    expose:
      - "3003"
    networks:
      - notes-net

  collab-service:
    build:
      context: ./services/collab-service
    environment:
      PORT: 3004
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-notes_admin}:${MONGO_INITDB_ROOT_PASSWORD:-notes_password}@mongodb:27017
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    expose:
      - "3004"
    networks:
      - notes-net

  sync-service:
    build:
      context: ./services/sync-service
    environment:
      PORT: 3005
      MYSQL_HOST: mysql
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-notes_admin}:${MONGO_INITDB_ROOT_PASSWORD:-notes_password}@mongodb:27017
    depends_on:
      - mysql
      - mongodb
    expose:
      - "3005"
    networks:
      - notes-net

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-notes_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-notes}
      MYSQL_USER: ${MYSQL_USER:-notes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-notes_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./infra/database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - notes-net

  mongodb:
    image: mongo:6
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-notes_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-notes_password}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - ./infra/database/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - notes-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - notes-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - notes-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - notes-net

networks:
  notes-net:
    driver: bridge

volumes:
  mysql-data:
  mongo-data:
  redis-data:
  qdrant-data:
  minio-data:
